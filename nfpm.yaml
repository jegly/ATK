name: "atk"
arch: "amd64"
platform: "linux"
version: "1.0.6"
section: "utils"
priority: "optional"
maintainer: "jegly <https://github.com/jegly>"
description: |
  ATK (Android Toolkit) — an all-in-one ADB GUI for Android power users,
  security researchers, and bug hunters.
vendor: "jegly"
homepage: "https://github.com/jegly/ATK"
license: "GPL-3.0"
contents:
  - src: "build/bin/ATK"
    dst: "/opt/atk/ATK"
    file_info:
      mode: 0755
  - src: "/opt/atk/ATK"
    dst: "/usr/bin/atk"
    type: "symlink"
  - src: "build/atk.desktop"
    dst: "/usr/share/applications/atk.desktop"
    file_info:
      mode: 0644
  - src: "build/appicon.png"
    dst: "/usr/share/icons/hicolor/256x256/apps/atk.png"
    file_info:
      mode: 0644
  - src: "build/appicon.png"
    dst: "/usr/share/pixmaps/atk.png"
    file_info:
      mode: 0644
depends:
  - adb
  - fastboot
  - libgtk-3-0
  - libwebkit2gtk-4.1-0
scripts:
  postinstall: "scripts/postinstall.sh"
  preremove: "scripts/preremove.sh"
